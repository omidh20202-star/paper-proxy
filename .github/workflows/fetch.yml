name: Fetch Article Info and Publish

on:
  workflow_dispatch:
    inputs:
      doi:
        description: 'مقاله DOI'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get metadata from CrossRef
        run: |
          curl -s -H "User-Agent: PaperBot/1.0 (mailto:your@email.com)" \
            "https://api.crossref.org/works/${{ github.event.inputs.doi }}" > article.json

      - name: Extract key fields
        run: |
          sudo apt-get install -y jq
          jq '{
            title: .message.title[0],
            author: [.message.author[]? | "\(.given) \(.family)"],
            year: .message.created."date-parts"[0][0],
            journal: .message."container-title"[0],
            publisher: .message.publisher,
            doi: .message.DOI,
            abstract: .message.abstract
          }' article.json > docs/metadata.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
